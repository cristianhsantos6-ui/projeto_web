<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto WEB HTML/CSS</title>

    <link rel="stylesheet" href="../css/style_formulario.css">
    <link rel="shortcut icon" href="../imagens/11646592591217345348.jpg" type="image/x-icon">
</head>

<body>
    <div id="links">
        <a href="../index.html">Página inicial</a> | <a href="texto.html"> Texto</a> | <a
            href="outros/texto_especial.html">texto Especial</a> | <a href="listas.html">listas</a> | <a
            href="imagens.html">Imagens</a> | <a href="formulario.html">Formulário</a>
    </div>

    <div id="div-form">
        <h3> Formulário</h3>

        <form name="form" id="form" method="post">
            <label for="nome">Nome</label>
            <input type="text" name="nome" id="nome" class="input-vlr01" maxlength="20" required
                placeholder="informe o nome">

            <label for="cpf">CPF</label>
            <input type="number" name="cpf" id="cpf" class="input-vlr01" maxlength="20" required
                placeholder="informe o cpf">

            <label for="datanasdecimento"> Data de Nascimento</label>
            <input type="data" name="datanasdecimento" id="datanasdecimento" class="input-vlr02" required>

            <label for="sexo">Sexo</label>
            <input type="radio" name="sexo" id="sexoM" class="input-op" value="M"> Masculino
            <input type="radio" name="sexo" id="sexoF" class="input-op" value="F"> Feminino
            <input type="radio" name="sexo" id="sexoN" class="input-op" value="N"> Não Declarado


            <label for="preferencias">Preferencias</label>
            <input type="checkbox" name="estudo" id="estudo" class="input-op" value="estudo">Estudo
            <input type="checkbox" name="trabalho" id="trabalho" class="input-op" value="trabalho">Trabalho
            <input type="checkbox" name="viagem" id="viagem" class="input-op" value="viagem">Viagem
            <input type="checkbox" name="compras" id="compras" class="input-op" value="compras">Compras


            <label for="senha">Senha</label>
            <input type="password" name="senha" id="senha" class="input-vlr02" maxlength="7" required
                placeholder="informar a senha">

            <label for="estado">Estado</label>
            <select name="estado" id="estado" class="input-vlr02" required>
                <option value="Al">Alagoas</option>
                <option value="Ba">Bahia</option>
                <option value="Ce">Ceará</option>
                <option value="Ma">Maranhão</option>
                <option value="Pb">Paraíba</option>
                <option value="Pe">Pernambuco</option>
                <option value="Pi">Piauí</option>
                <option value="Rn">Rio Grande do Norte</option>
                <option value="Se">Sergipe</option>
            </select>

            <label for="comentario">Comentário</label>
            <textarea name="cometario" id="comentario" placeholder="informar seu comentário" required></textarea>
            <div id="div-bnts">
                <button type="submit" id="btn-enviar">Enviar</button>
                <button type="reset" id="btn-limpar">Limpar</button>
                <button id="btn">Botão</button>
            </div>

        </form>
    </div>
</body>

</html>
